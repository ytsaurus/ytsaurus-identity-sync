name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'release/[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.11.2

      - name: Docker login
        run: |
          echo '${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}' | docker login ghcr.io --username ${{ secrets.GH_USERNAME }} --password-stdin

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ghcr.io/ytsaurus-identity-sync
          tags: |
            type=match,pattern=\d.\d.\d

      - name: Build and push Docker image
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Parse tag
        id: tag
        run: |
          echo "version=$(echo ${GITHUB_REF_NAME#release/*})" >> $GITHUB_OUTPUT

      - name: Package And Push Helm Chart
        run: |
          sed -i 's/tag: .*/tag: "${{ steps.tag.outputs.version }}"/' ytsaurus-identity-sync-chart/values.yaml
          helm package ytsaurus-identity-sync-chart --version ${{ steps.tag.outputs.version }}
          helm push ytsaurus-identity-sync-chart-${{ steps.tag.outputs.version }}.tgz oci://ghcr.io/ytsaurus
